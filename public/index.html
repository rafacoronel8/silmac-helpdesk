<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Silmac Help Desk</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="images/silmac.ico">
    <link rel="stylesheet" href="styleIndex.css">
</head>
<body>

<nav class="navbar">
    <a href="/" class="nav-brand">
        <i class="fas fa-headset"></i>
        <span>Silmac Help Desk</span>
    </a>
    <button class="nav-dashboard" onclick="openLogin()">
        <i class="fas fa-lock"></i>
        Dashboard
    </button>
</nav>

<main class="main">

    <div class="page-intro">
        <h1>Precisas de apoio técnico?</h1>
        <p>Submete o teu pedido e a equipa de TI trata do resto.</p>
    </div>

    <div class="form-card">

        <form id="ticketForm">

            <div class="form-row">
                <div class="form-group">
                    <label for="userName">Nome completo <span class="req">*</span></label>
                    <input type="text" id="userName" placeholder="Ex: João Silva" required>
                </div>
                <div class="form-group">
                    <label for="contacto">Contacto <span class="opt">(opcional)</span></label>
                    <input type="text" id="contacto" placeholder="Ex: 991 234 567">
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="department">Departamento</label>
                    <select id="department">
                        <option value="">— Selecionar —</option>
                        <option value="RH">RH</option>
                        <option value="Recepcao">Receção</option>
                        <option value="Contabilidade">Contabilidade</option>
                        <option value="Gestor HSSG">Gestão</option>
                        <option value="Financeiro">Financeiro</option>
                        <option value="Vendas">Vendas</option>
                        <option value="Marketing">Marketing</option>
                        <option value="TI">TI</option>
                        <option value="Geral">Direção Geral</option>
                        <option value="Vigilancia">Vigilância Humana</option>
                        <option value="Comercial">Comercial</option>
                        <option value="Outro">Outro</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="ilha">Ilha <span class="req">*</span></label>
                    <select id="ilha" required>
                        <option value="">— Selecionar —</option>
                        <option value="Santo Antão">Santo Antão</option>
                        <option value="São Vicente">São Vicente</option>
                        <option value="Sal">Sal</option>
                        <option value="Boa Vista">Boa Vista</option>
                        <option value="Maio">Maio</option>
                        <option value="Santiago">Santiago</option>
                        <option value="Fogo">Fogo</option>
                        <option value="Brava">Brava</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label for="category">Tipo de problema <span class="req">*</span></label>
                <select id="category" required>
                    <option value="">— Selecionar —</option>
                    <option value="Email não funciona|Media">Email não funciona</option>
                    <option value="Email suspeito|Alta">Email Suspeito</option>
                    <option value="Issues Backup|Alta">Backup</option>
                    <option value="Internet/Rede|Alta">Internet / Rede não funciona</option>
                    <option value="Software|Media">Programa não abre</option>
                    <option value="Hardware|Media">Hardware / Impressora</option>
                    <option value="Senha|Media">Esqueci a senha</option>
                    <option value="VPN|Alta">VPN não conecta</option>
                    <option value="Office|Media">Office desatualizado</option>
                    <option value="Telefone|Baixa">Telefone</option>
                    <option value="Primavera|Media">Primavera</option>
                    <option value="Documento|Baixa">Ajuda com documento</option>
                    <option value="Outro|Baixa">Outro problema</option>
                </select>
            </div>

            <div class="form-group">
                <label for="description">Descrição <span class="opt">(opcional)</span></label>
                <textarea id="description" placeholder="Descreve o problema com mais detalhe..."></textarea>
            </div>

            <button type="submit" class="btn-submit">
                <i class="fas fa-paper-plane"></i>
                Submeter Ticket
            </button>

        </form>

    </div>

    <div class="info-row">
        <div class="info-item">
            <i class="fas fa-bolt"></i>
            <span>Alta prioridade tratada primeiro</span>
        </div>
        <div class="info-item">
            <i class="fas fa-map-marker-alt"></i>
            <span>Suporte em todo o arquipélago</span>
        </div>
        <div class="info-item">
            <i class="fas fa-shield-alt"></i>
            <span>Dados protegidos</span>
        </div>
    </div>

</main>

<!-- LOGIN MODAL -->
<div id="loginModal" class="modal-overlay">
    <div class="modal-card">
        <button class="modal-close" onclick="closeLogin()"><i class="fas fa-times"></i></button>
        <div class="modal-icon"><i class="fas fa-lock"></i></div>
        <h2 class="modal-title">Acesso ao Dashboard</h2>
        <p class="modal-sub">Restrito à equipa de TI</p>

        <div class="form-group">
            <label>Username</label>
            <input type="text" id="loginUser" placeholder="Utilizador" autocomplete="username">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="loginPass" placeholder="••••••••" autocomplete="current-password">
        </div>
        <p id="loginError" class="login-error"></p>

        <button class="btn-submit" onclick="login()">
            <i class="fas fa-sign-in-alt"></i> Entrar
        </button>
    </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast">
    <i class="fas fa-check-circle"></i>
    <span id="toastMsg">Ticket criado com sucesso!</span>
</div>

<script src="script.js"></script>

</body>
</html>
